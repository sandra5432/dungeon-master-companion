spring:
  datasource:
    url: jdbc:h2:mem:pardurdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        hbm2ddl:
          import_files_sql_extractor: org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  servlet:
    session:
      cookie:
        secure: false
